<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Lunar Regolith Simulant Database — Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #f8fafc;
            background: radial-gradient(circle at 30% 20%, #2a2550 0%, #1a1730 45%, #0d0b1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            overflow: hidden;
        }

        .card {
            position: relative;
            z-index: 2;
            max-width: 560px;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 48px 40px;
            backdrop-filter: blur(8px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        }

        .moon {
            width: 96px;
            height: 96px;
            margin: 0 auto 28px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #e9e6f5, #b8b2d8 60%, #8d86b8 100%);
            box-shadow: 0 0 60px rgba(118, 75, 162, 0.55),
                inset -14px -10px 28px rgba(0, 0, 0, 0.35);
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        .moon::before,
        .moon::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.10);
        }

        .moon::before {
            width: 20px;
            height: 20px;
            top: 22px;
            left: 28px;
        }

        .moon::after {
            width: 12px;
            height: 12px;
            bottom: 24px;
            right: 30px;
            box-shadow: -22px -6px 0 -2px rgba(0, 0, 0, 0.08);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #c3cbff, #e7c6ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.02rem;
            line-height: 1.6;
            color: #cbd0e8;
            margin-bottom: 12px;
        }

        .sub {
            font-size: 0.9rem;
            color: #8e93b5;
            margin-top: 20px;
        }

        .badge {
            display: inline-block;
            margin-bottom: 24px;
            padding: 6px 14px;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #e7c6ff;
            border: 1px solid rgba(231, 198, 255, 0.3);
            border-radius: 999px;
            background: rgba(118, 75, 162, 0.18);
        }

        .stars {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                radial-gradient(1px 1px at 20% 30%, #fff, transparent),
                radial-gradient(1px 1px at 70% 60%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 40% 80%, #fff, transparent),
                radial-gradient(1px 1px at 85% 25%, #fff, transparent),
                radial-gradient(1px 1px at 55% 15%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 10% 70%, #fff, transparent),
                radial-gradient(1px 1px at 90% 80%, #fff, transparent);
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="stars"></div>
    <div class="card">
        <div class="moon" role="img" aria-label="Moon"></div>
        <div class="badge">Temporarily offline</div>
        <h1>Down for maintenance</h1>
        <p>The Lunar Regolith Simulant Database is temporarily unavailable while we
            review and update its data.</p>
        <p>We'll be back online shortly. Thank you for your patience.</p>
        <p class="sub">If you need information urgently, please contact the project team.</p>
    </div>
</body>

</html>
